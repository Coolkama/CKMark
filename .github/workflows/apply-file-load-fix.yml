name: Apply WYSIWYG file loading fix

on:
  push:
    branches:
      - main
    paths:
      - '.github/triggers/apply-file-load-fix'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply patch
        run: python tools/apply_file_load_fix.py

      - name: Commit patched ScienceMD file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes required"
          else
            git commit -m "Fix Markdown loading from WYSIWYG mode"
            git push
          fi
