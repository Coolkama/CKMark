name: Publish Sciwrix 1.6.0

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/publish-sciwrix-1.6.0.yml'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION_NAME: '1.6.0'
      VERSION_CODE: '15'
      TAG: 'v1.6.0'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Sciwrix smoke checks
        id: smoke
        continue-on-error: true
        shell: bash
        run: python3 tools/smoke_test.py > smoke-test-output.txt 2>&1

      - name: Upload smoke-test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Sciwrix-1.6.0-smoke-test-output
          path: smoke-test-output.txt
          if-no-files-found: error
          retention-days: 7

      - name: Require smoke checks to pass
        if: steps.smoke.outcome != 'success'
        shell: bash
        run: |
          cat smoke-test-output.txt
          exit 1

      - name: Verify release notices
        run: |
          test -s LICENSE
          test -s NOTICE
          test -s THIRD_PARTY_NOTICES.md
          test -s WICKED_GOOD_XPATH_LICENSE.txt

      - name: Validate signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for value_name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [[ -z "${!value_name:-}" ]]; then
              echo "::error::Required Android signing secret is missing: $value_name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Restore Android signing key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/sciwrix-release.jks"
          test -s "$RUNNER_TEMP/sciwrix-release.jks"

      - name: Build signed release APK
        working-directory: android
        shell: bash
        env:
          SCIENCEMD_KEYSTORE_PATH: ${{ runner.temp }}/sciwrix-release.jks
          SCIENCEMD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SCIENCEMD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SCIENCEMD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon :app:clean :app:lintRelease :app:assembleRelease \
            -PSCIENCEMD_VERSION_NAME="$VERSION_NAME" \
            -PSCIENCEMD_VERSION_CODE="$VERSION_CODE"

      - name: Verify, package and checksum release files
        id: package
        shell: bash
        run: |
          set -euo pipefail

          source_apk="android/app/build/outputs/apk/release/app-release.apk"
          release_dir="$RUNNER_TEMP/sciwrix-release"
          release_apk="$release_dir/Sciwrix-v${VERSION_NAME}.apk"
          latest_apk="$release_dir/Sciwrix.apk"
          release_html="$release_dir/Sciwrix-v${VERSION_NAME}.html"
          latest_html="$release_dir/Sciwrix.html"
          checksum_file="$release_dir/Sciwrix-v${VERSION_NAME}-SHA256SUMS.txt"

          mkdir -p "$release_dir"
          cp "$source_apk" "$release_apk"
          cp "$source_apk" "$latest_apk"
          cp index.html "$release_html"
          cp index.html "$latest_html"

          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$build_tools/apksigner" verify --verbose --print-certs "$release_apk"

          (
            cd "$release_dir"
            sha256sum \
              "Sciwrix-v${VERSION_NAME}.apk" \
              "Sciwrix.apk" \
              "Sciwrix-v${VERSION_NAME}.html" \
              "Sciwrix.html" \
              > "$(basename "$checksum_file")"
          )

          echo "apk=$release_apk" >> "$GITHUB_OUTPUT"
          echo "apk_latest=$latest_apk" >> "$GITHUB_OUTPUT"
          echo "html=$release_html" >> "$GITHUB_OUTPUT"
          echo "html_latest=$latest_html" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum_file" >> "$GITHUB_OUTPUT"

      - name: Upload signed release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sciwrix-v1.6.0
          path: |
            ${{ steps.package.outputs.apk }}
            ${{ steps.package.outputs.apk_latest }}
            ${{ steps.package.outputs.html }}
            ${{ steps.package.outputs.html_latest }}
            ${{ steps.package.outputs.checksum }}
            LICENSE
            NOTICE
            THIRD_PARTY_NOTICES.md
            WICKED_GOOD_XPATH_LICENSE.txt
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          APK: ${{ steps.package.outputs.apk }}
          APK_LATEST: ${{ steps.package.outputs.apk_latest }}
          HTML: ${{ steps.package.outputs.html }}
          HTML_LATEST: ${{ steps.package.outputs.html_latest }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::GitHub Release $TAG already exists"
            exit 1
          fi

          gh release create "$TAG" \
            "$APK" \
            "$APK_LATEST" \
            "$HTML" \
            "$HTML_LATEST" \
            "$CHECKSUM" \
            LICENSE \
            NOTICE \
            THIRD_PARTY_NOTICES.md \
            WICKED_GOOD_XPATH_LICENSE.txt \
            --target main \
            --title "Sciwrix $TAG" \
            --generate-notes
