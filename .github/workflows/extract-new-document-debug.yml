name: Apply ScienceMD maintenance

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/extract-new-document-debug.yml
      - tools/fix_new_document_reset.py
      - tools/update_home_legal.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply editor and licensing maintenance
        run: |
          python3 tools/fix_new_document_reset.py
          python3 tools/update_home_legal.py

      - name: Run ScienceMD smoke checks
        run: python3 tools/smoke_test.py

      - name: Commit maintained ScienceMD files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html home/index.html tools/smoke_test.py
          git commit -m "Apply ScienceMD licence presentation" || exit 0
          git push
