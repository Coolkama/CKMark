name: Fix Normal block style

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/fix-normal-block-style.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/revised-ribbon-ui
          fetch-depth: 0

      - name: Repair Normal block-style behaviour
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          replacement = '''  function applyVisualBlock(kind) {
            const visual = byId('wysiwygEditor');
            if (!visual) return false;
            const tag = kind === 'code' ? '<pre>' : '<p>';

            if (typeof window.execWysiwyg === 'function') {
              window.execWysiwyg('formatBlock', tag);
              return true;
            }

            document.execCommand('formatBlock', false, tag);
            dispatchEditorInput(visual);
            return true;
          }

          function detectCurrentBlockStyle() {
            if (isSourceMode()) {
              const source = byId('editor');
              if (!source) return null;
              const text = source.value || '';
              const position = source.selectionStart ?? 0;
              const lineStart = text.lastIndexOf('\\n', Math.max(0, position - 1)) + 1;
              const nextBreak = text.indexOf('\\n', position);
              const lineEnd = nextBreak === -1 ? text.length : nextBreak;
              const line = text.slice(lineStart, lineEnd);
              if (/^###\\s+/.test(line)) return 'h3';
              if (/^##\\s+/.test(line)) return 'h2';
              if (/^#\\s+/.test(line)) return 'h1';
              if (/^>\\s?/.test(line)) return 'quote';
              const fences = text.slice(0, position).match(/^```/gm);
              if (fences && fences.length % 2 === 1) return 'code';
              return 'normal';
            }

            const visual = byId('wysiwygEditor');
            const selection = window.getSelection();
            if (!visual || !selection || !selection.rangeCount) return null;
            let node = selection.anchorNode;
            if (node && node.nodeType === Node.TEXT_NODE) node = node.parentElement;
            if (!node || !visual.contains(node)) return null;

            for (let current = node; current && current !== visual; current = current.parentElement) {
              const tag = current.tagName ? current.tagName.toLowerCase() : '';
              if (tag === 'h1' || tag === 'h2' || tag === 'h3') return tag;
              if (tag === 'blockquote') return 'quote';
              if (tag === 'pre') return 'code';
              if (tag === 'p' || tag === 'div' || tag === 'li') return 'normal';
            }
            return 'normal';
          }

          function syncBlockStyleSelect() {
            const select = byId('sciwrixBlockStyle');
            if (!select) return;
            const style = detectCurrentBlockStyle();
            if (style && Array.from(select.options).some(option => option.value === style)) {
              select.value = style;
            }
          }

          function applyBlockStyle'''

          pattern = re.compile(
              r"  function applyVisualBlock\(kind\) \{.*?\n  \}\n\n  function applyBlockStyle",
              re.DOTALL,
          )
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Could not replace applyVisualBlock; matches={count}')

          anchor = "    if (state.activeTab === 'view') {"
          if text.count(anchor) != 1:
              raise SystemExit(f'Unexpected renderToolbar view anchor count: {text.count(anchor)}')
          text = text.replace(
              anchor,
              "    if (state.activeTab === 'markdown') {\n      setTimeout(syncBlockStyleSelect, 0);\n    }\n\n" + anchor,
              1,
          )

          reset_pattern = re.compile(
              r"(applyBlockStyle\(event\.target\.value\);)\s*event\.target\.value\s*=\s*'normal';"
          )
          text, count = reset_pattern.subn(
              r"\1\n        setTimeout(syncBlockStyleSelect, 0);",
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'Could not remove forced Normal reset; matches={count}')

          initialise_marker = "  }\n\n  if (document.readyState === 'loading') {"
          listener_block = '''

            const source = byId('editor');
            if (source) {
              source.addEventListener('click', () => {
                if (state.activeTab === 'markdown') syncBlockStyleSelect();
              });
              source.addEventListener('keyup', () => {
                if (state.activeTab === 'markdown') syncBlockStyleSelect();
              });
            }

            document.addEventListener('selectionchange', () => {
              if (state.activeTab === 'markdown' && !isSourceMode()) syncBlockStyleSelect();
            });
          }

          if (document.readyState === 'loading') {'''
          if text.count(initialise_marker) != 1:
              raise SystemExit(f'Unexpected initialise marker count: {text.count(initialise_marker)}')
          text = text.replace(initialise_marker, listener_block, 1)

          if "event.target.value = 'normal';" in text:
              raise SystemExit('The block-style selector is still being forcibly reset')
          if "window.execWysiwyg('formatBlock', tag)" not in text:
              raise SystemExit('Normal style does not use the selection-preserving formatter')
          if 'function syncBlockStyleSelect()' not in text:
              raise SystemExit('Block-style synchronisation was not inserted')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Run repository smoke checks
        run: python3 tools/smoke_test.py

      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Make Normal block style functional'
          git push origin HEAD:feature/revised-ribbon-ui
