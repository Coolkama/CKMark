name: Fix Science Paper editor width v2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply targeted visual editor width fix
        run: python3 tools/fix_science_paper_edit_width_v2.py

      - name: Run smoke checks
        run: python3 tools/smoke_test.py

      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No editor width changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Widen visual editor for paper-like styles"
          git push origin HEAD:main
