name: Diagnose autosave runtime

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/diagnose-autosave-runtime.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/revised-ribbon-ui
          fetch-depth: 0

      - name: Extract frame-related contexts
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          patterns = [
              r'<iframe\b',
              r'createElement\(["\']iframe["\']\)',
              r'contentWindow',
              r'contentDocument',
              r'window\.frames',
              r'\.src\s*=\s*[^;]+',
              r'location\.(?:href|assign|replace)',
          ]
          out = []
          for pattern in patterns:
              out.append(f'\n===== {pattern} =====\n')
              matches = list(re.finditer(pattern, text, flags=re.I))
              out.append(f'count={len(matches)}\n')
              for index, match in enumerate(matches[:30], 1):
                  pos = match.start()
                  lo = max(0, pos - 700)
                  hi = min(len(text), pos + 1200)
                  out.append(f'\n--- {index} at {pos} ---\n{text[lo:hi]}\n')
          Path('_runtime_diagnostic.txt').write_text(''.join(out), encoding='utf-8')
          PY

      - name: Commit diagnostic
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _runtime_diagnostic.txt
          git commit -m 'Focus temporary diagnostic on frame access'
          git push origin HEAD:feature/revised-ribbon-ui
