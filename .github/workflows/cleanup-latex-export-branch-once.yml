name: Clean LaTeX export branch once

on:
  push:
    branches:
      - feature/latex-output
    paths:
      - .github/workflows/cleanup-latex-export-branch-once.yml

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/latex-output
          fetch-depth: 0

      - name: Re-run tests before cleanup
        run: |
          python3 tools/smoke_test.py
          node tools/test_latex_export.js

      - name: Remove temporary implementation files
        run: |
          rm -f .github/workflows/apply-latex-export-once.yml
          rm -f .github/workflows/inspect-export-flow-once.yml
          rm -f .github/workflows/fix-latex-nested-tokens-once.yml
          rm -f .github/workflows/test-latex-export-once.yml
          rm -f .github/workflows/test-latex-export-corrected-once.yml
          rm -f tools/.latex_patch_1.b64
          rm -f tools/.latex_patch_2.b64
          rm -f tools/.latex_patch_3.b64
          rm -f tools/apply_latex_export.py
          rm -f tools/export_flow_report.txt
          rm -f tools/fix_latex_nested_tokens.py
          rm -f tools/inspect_export_flow.py
          rm -f tools/latex_export_body_a.js
          rm -f tools/latex_export_body_b.js
          rm -f tools/latex_export_document.js
          rm -f tools/latex_export_inline.js
          rm -f tools/latex_export_save_dialog.js
          rm -f tools/latex_export_tables.js
          rm -f tools/test_latex_export.js
          rm -f tools/latex_test_passed.txt

      - name: Commit clean branch
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean temporary LaTeX export files"
          git push origin feature/latex-output
