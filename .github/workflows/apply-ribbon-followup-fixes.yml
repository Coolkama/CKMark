name: Apply ribbon follow-up fixes

on:
  push:
    branches:
      - feature/revised-ribbon-ui
    paths:
      - tools/apply_ribbon_followup_fixes.py
      - .github/workflows/apply-ribbon-followup-fixes.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/revised-ribbon-ui
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply safe follow-up patch
        run: python3 tools/apply_ribbon_followup_fixes.py

      - name: Run repository smoke tests
        run: python3 tools/smoke_test.py

      - name: Validate final HTML tail and injected JavaScript
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import subprocess
          import tempfile

          text = Path('index.html').read_text(encoding='utf-8')
          marker = 'sciwrix-ribbon-followup-fixes'
          assert text.count(f'id="{marker}"') == 1
          assert text.rstrip().endswith('</html>')
          assert text.rfind(f'id="{marker}"') > text.rfind('</script>', 0, text.rfind(f'id="{marker}"'))
          assert text.rfind(f'id="{marker}"') < text.rfind('</body>')

          class Scripts(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=False)
                  self.capture = False
                  self.current = []
                  self.scripts = []
                  self.attrs = {}
              def handle_starttag(self, tag, attrs):
                  if tag.lower() == 'script':
                      self.attrs = dict(attrs)
                      self.capture = 'src' not in self.attrs
                      self.current = []
              def handle_data(self, data):
                  if self.capture:
                      self.current.append(data)
              def handle_endtag(self, tag):
                  if tag.lower() == 'script' and self.capture:
                      script_type = self.attrs.get('type', '').lower()
                      if script_type in ('', 'text/javascript', 'application/javascript', 'module'):
                          self.scripts.append((script_type, ''.join(self.current)))
                      self.capture = False

          parser = Scripts()
          parser.feed(text)
          assert parser.scripts, 'No inline scripts found'

          with tempfile.TemporaryDirectory() as tmp:
              for i, (script_type, source) in enumerate(parser.scripts):
                  if not source.strip():
                      continue
                  suffix = '.mjs' if script_type == 'module' else '.js'
                  path = Path(tmp) / f'script-{i}{suffix}'
                  path.write_text(source, encoding='utf-8')
                  subprocess.run(['node', '--check', str(path)], check=True)
          PY

      - name: Verify follow-up markers
        run: |
          grep -q 'sciwrix-ribbon-followup-fixes' index.html
          grep -q 'Export HTML' index.html
          grep -q 'Export LaTeX' index.html

      - name: Commit fixed application
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then
            echo 'No index.html changes required'
            exit 0
          fi
          git commit -m 'Fix drawer layering and export defaults safely'
          git push origin HEAD:feature/revised-ribbon-ui
