name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'android/**'
      - 'tools/smoke_test.py'
      - '.github/workflows/build-android-apk.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'index.html'
      - 'android/**'
      - 'tools/smoke_test.py'
      - 'tools/repair_starter_literal.py'
      - '.github/workflows/build-android-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/revised-ribbon-ui
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Repair starter document JavaScript literal
        run: python3 tools/repair_starter_literal.py

      - name: Run Sciwrix smoke checks
        run: python3 tools/smoke_test.py

      - name: Capture post-repair validation
        run: |
          set +e
          python3 - <<'PY' > tools/postrepair_validation.txt 2>&1
          from html.parser import HTMLParser
          from pathlib import Path
          import subprocess
          import tempfile

          text = Path('index.html').read_text(encoding='utf-8')
          failures = []

          def check(name, condition):
              print(f'{name}: {"PASS" if condition else "FAIL"}')
              if not condition:
                  failures.append(name)

          check('starter title', '# Welcome to Sciwrix' in text)
          check('ribbon section', '## The ribbon' in text)
          check('help ribbon tabs', '<h3>Ribbon tabs</h3>' in text)
          check('help layout section', '<h3>Editing views and layout</h3>' in text)
          check('help style section', '<h3>Document style, printing, and export</h3>' in text)
          check('help heading encoded', '<strong>Help &amp; About</strong>' in text)
          check('help heading literal', '<strong>Help & About</strong>' in text)
          check('old top toolbar removed', '<h3>Top toolbar</h3>' not in text)
          check('old edit toolbar removed', '<h3>Edit toolbar</h3>' not in text)
          check('licence start preserved', text.count('SCIENCEMD-LICENCES-START') == 1)
          check('licence end preserved', text.count('SCIENCEMD-LICENCES-END') == 1)
          check('valid document tail', text.rstrip().endswith('</html>'))

          class Scripts(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=False)
                  self.capture = False
                  self.current = []
                  self.scripts = []
                  self.attrs = {}
              def handle_starttag(self, tag, attrs):
                  if tag.lower() == 'script':
                      self.attrs = dict(attrs)
                      self.capture = 'src' not in self.attrs
                      self.current = []
              def handle_data(self, data):
                  if self.capture:
                      self.current.append(data)
              def handle_endtag(self, tag):
                  if tag.lower() == 'script' and self.capture:
                      script_type = self.attrs.get('type', '').lower()
                      if script_type in ('', 'text/javascript', 'application/javascript', 'module'):
                          self.scripts.append((script_type, ''.join(self.current)))
                      self.capture = False

          parser = Scripts()
          parser.feed(text)
          node_ok = True
          with tempfile.TemporaryDirectory() as tmp:
              for i, (script_type, source) in enumerate(parser.scripts):
                  if not source.strip():
                      continue
                  suffix = '.mjs' if script_type == 'module' else '.js'
                  path = Path(tmp) / f'script-{i}{suffix}'
                  path.write_text(source, encoding='utf-8')
                  result = subprocess.run(['node', '--check', str(path)], text=True, capture_output=True)
                  if result.returncode:
                      node_ok = False
                      print(f'Node syntax failure in script {i}:')
                      print(result.stdout)
                      print(result.stderr)
          check('inline JavaScript syntax', node_ok)
          print(f'Total failures: {len(failures)}')
          raise SystemExit(1 if failures else 0)
          PY
          status=$?
          set -e
          cat tools/postrepair_validation.txt
          echo "Validation exit status: $status" >> tools/postrepair_validation.txt

      - name: Lint and build debug APK
        working-directory: android
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:lintDebug :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Sciwrix-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Commit repaired onboarding content
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html tools/postrepair_validation.txt
          if git diff --cached --quiet; then
            echo 'No onboarding changes required'
            exit 0
          fi
          git commit -m 'Repair starter document JavaScript literal'
          git push origin HEAD:feature/revised-ribbon-ui
