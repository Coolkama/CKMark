name: Extract onboarding context

on:
  push:
    branches:
      - feature/revised-ribbon-ui
    paths:
      - tools/extract_onboarding_context.py
      - .github/workflows/extract-onboarding-context.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/revised-ribbon-ui
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 tools/extract_onboarding_context.py
      - name: Commit context excerpt
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/onboarding_context.txt
          if git diff --cached --quiet; then
            echo 'No context changes'
            exit 0
          fi
          git commit -m 'Add temporary onboarding context excerpt'
          git push origin HEAD:feature/revised-ribbon-ui
